<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F2F4A" />
  <title>Historial de órdenes — TECNIMAX Taller</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="app-body">
  <div class="bg-decoration" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
  </div>

  <header class="app-header">
    <div class="app-brand">
      <strong>TECNIMAX</strong> · Historial · <span id="user-nombre-header">Administración</span>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <a id="btn-volver" href="admin.html" class="btn-config" title="Volver al panel">← Volver al panel</a>
      <button id="btn-logout" class="btn-logout">Salir</button>
    </div>
  </header>

  <main class="hist-main">

    <!-- ============= BÚSQUEDA ============= -->
    <section class="card hist-busqueda">
      <div class="hist-tipo-chips" role="tablist" aria-label="Tipo de búsqueda">
        <button class="hist-chip hist-chip-active" data-tipo="placa" role="tab" aria-selected="true">🚗 Placa</button>
        <button class="hist-chip" data-tipo="orden" role="tab" aria-selected="false">📋 Nº Orden</button>
        <button class="hist-chip" data-tipo="tecnico" role="tab" aria-selected="false">👤 Técnico</button>
        <button class="hist-chip" data-tipo="servicio" role="tab" aria-selected="false">🔧 Servicio</button>
      </div>

      <!-- Input de texto (placa, orden) o combobox (tecnico, servicio) según tipo -->
      <input
        type="search"
        id="hist-search-input"
        class="field-input hist-search-input"
        placeholder="Ej: TAXI 7036"
        autocomplete="off"
        autofocus
      />

      <!-- Combobox con búsqueda — usado para técnico y servicio -->
      <div class="hist-combobox" id="hist-combobox" hidden>
        <div class="hist-combo-trigger" id="hist-combo-trigger" tabindex="0" role="combobox" aria-expanded="false">
          <span class="hist-combo-text" id="hist-combo-text">Selecciona…</span>
          <span class="hist-combo-clear" id="hist-combo-clear" hidden title="Limpiar">×</span>
          <span class="hist-combo-arrow">▼</span>
        </div>
        <div class="hist-combo-panel" id="hist-combo-panel" hidden>
          <input type="text" class="hist-combo-search" id="hist-combo-search" placeholder="Filtrar..." autocomplete="off" />
          <div class="hist-combo-list" id="hist-combo-list" role="listbox"></div>
        </div>
      </div>

      <div class="hist-filtros">
        <label class="hist-filtro-label">
          <span>📅 Período</span>
          <select id="hist-fecha-select" class="hist-select">
            <option value="todas">Todas las fechas</option>
            <option value="7">Últimos 7 días</option>
            <option value="30">Últimos 30 días</option>
            <option value="90">Últimos 90 días</option>
            <option value="365">Último año</option>
          </select>
        </label>

        <label class="hist-filtro-label">
          <span>📊 Estado</span>
          <select id="hist-estado-select" class="hist-select">
            <option value="todos">Todos</option>
            <option value="completada">Completadas</option>
            <option value="cancelada">Canceladas</option>
            <option value="en_progreso">En curso</option>
            <option value="abierta">Abiertas</option>
          </select>
        </label>

        <button type="button" class="hist-btn-limpiar" id="hist-btn-limpiar">Limpiar</button>
      </div>
    </section>

    <!-- ============= PANEL DE ESTADÍSTICAS (Técnico + Servicio) ============= -->
    <section class="card hist-stats-card" id="hist-stats-card" hidden>
      <div class="hist-stats-header">
        <span class="hist-stats-icon">📊</span>
        <div>
          <div class="hist-stats-title" id="hist-stats-title">—</div>
          <div class="hist-stats-sub" id="hist-stats-sub">—</div>
        </div>
      </div>
      <div class="hist-stats-grid">
        <div class="hist-stat-cell">
          <div class="hist-stat-label">Servicios realizados</div>
          <div class="hist-stat-value" id="hist-stat-count">—</div>
        </div>
        <div class="hist-stat-cell">
          <div class="hist-stat-label">Promedio personal</div>
          <div class="hist-stat-value" id="hist-stat-promedio">—</div>
          <div class="hist-stat-extra" id="hist-stat-vs-media">—</div>
        </div>
        <div class="hist-stat-cell">
          <div class="hist-stat-label">Media taller</div>
          <div class="hist-stat-value" id="hist-stat-media-taller">—</div>
          <div class="hist-stat-extra" id="hist-stat-media-base">—</div>
        </div>
        <div class="hist-stat-cell">
          <div class="hist-stat-label">⚡ Más rápido</div>
          <div class="hist-stat-value hist-stat-rapido" id="hist-stat-min">—</div>
        </div>
        <div class="hist-stat-cell">
          <div class="hist-stat-label">🐢 Más lento</div>
          <div class="hist-stat-value hist-stat-lento" id="hist-stat-max">—</div>
        </div>
      </div>
    </section>

    <!-- ============= RESULTADOS ============= -->
    <section class="card hist-resultados-card">
      <div class="card-header">
        <h2 class="section-title-h2">Resultados</h2>
        <span class="card-badge" id="hist-resultados-count">0</span>
      </div>
      <div id="hist-loading" class="empty-state">
        <p>Cargando órdenes...</p>
      </div>
      <div id="hist-ordenes-list" class="hist-ordenes-list" hidden></div>
      <div id="hist-empty" class="empty-state" hidden>
        <p>Sin órdenes que coincidan con la búsqueda.</p>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.5rem;">Probá con otra placa, número o filtro.</p>
      </div>
    </section>

  </main>

  <style>
    /* ===== HISTORIAL — estilo TECNIMAX ===== */
    .hist-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--sp-3, 16px);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3, 16px);
    }

    /* Botón volver / config (reutilizado del admin) */
    .btn-config {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border, rgba(255,255,255,0.10));
      border-radius: var(--r-sm, 8px);
      color: var(--text, #e6e9ef);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-config:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--text-muted, #8b94a3);
    }

    /* === Búsqueda === */
    .hist-busqueda {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ===== Combobox con búsqueda (técnico / servicio) ===== */
    .hist-combobox {
      position: relative;
      width: 100%;
    }
    .hist-combo-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1rem;
    }
    .hist-combo-trigger:hover { background: rgba(255,255,255,0.08); }
    .hist-combo-trigger:focus,
    .hist-combo-trigger.is-open {
      outline: none;
      border-color: #2f7fe0;
      background: rgba(255,255,255,0.06);
    }
    .hist-combo-text {
      flex: 1;
      color: var(--text, #e6e9ef);
    }
    .hist-combo-text.is-placeholder {
      color: var(--text-muted, #8b94a3);
    }
    .hist-combo-clear {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.10);
      border-radius: 50%;
      color: var(--text-muted, #8b94a3);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .hist-combo-clear:hover {
      background: rgba(220, 53, 69, 0.20);
      color: var(--rojo-urgente, #dc3545);
    }
    .hist-combo-arrow {
      color: var(--text-muted, #8b94a3);
      font-size: 0.7rem;
      transition: transform 0.2s;
    }
    .hist-combo-trigger.is-open .hist-combo-arrow {
      transform: rotate(180deg);
    }
    .hist-combo-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #15263d;
      border: 1px solid rgba(47, 127, 224, 0.40);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      z-index: 50;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .hist-combo-search {
      padding: 10px 12px;
      background: rgba(0,0,0,0.20);
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: var(--text, #e6e9ef);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .hist-combo-search:focus { background: rgba(0,0,0,0.30); }
    .hist-combo-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .hist-combo-item {
      padding: 10px 14px;
      cursor: pointer;
      color: var(--text, #e6e9ef);
      font-size: 0.9rem;
      transition: background 0.1s;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .hist-combo-item:hover,
    .hist-combo-item.is-active {
      background: rgba(47, 127, 224, 0.18);
      color: #fff;
    }
    .hist-combo-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted, #8b94a3);
    }
    .hist-combo-empty {
      padding: 16px;
      text-align: center;
      color: var(--text-muted, #8b94a3);
      font-size: 0.85rem;
      font-style: italic;
    }

    /* ===== Panel de estadísticas (Técnico × Servicio) ===== */
    .hist-stats-card {
      padding: 16px;
      border: 1px solid rgba(47, 127, 224, 0.30);
      background: linear-gradient(180deg, rgba(47, 127, 224, 0.06), rgba(255, 255, 255, 0.02));
    }
    .hist-stats-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .hist-stats-icon { font-size: 1.5rem; }
    .hist-stats-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text, #e6e9ef);
    }
    .hist-stats-sub {
      font-size: 0.8rem;
      color: var(--text-muted, #8b94a3);
      margin-top: 2px;
    }
    .hist-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .hist-stat-cell {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hist-stat-label {
      font-size: 0.7rem;
      color: var(--text-muted, #8b94a3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .hist-stat-value {
      font-family: var(--font-mono, monospace);
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text, #e6e9ef);
    }
    .hist-stat-extra {
      font-size: 0.72rem;
      color: var(--text-muted, #8b94a3);
    }
    .hist-stat-rapido { color: var(--verde-ok, #28a745); }
    .hist-stat-lento  { color: var(--rojo-urgente, #dc3545); }
    .hist-stat-vs-rapido { color: var(--verde-ok, #28a745); font-weight: 600; }
    .hist-stat-vs-lento  { color: var(--rojo-urgente, #dc3545); font-weight: 600; }

    /* Indicador rápido/lento sobre cada servicio en la lista */
    .hist-servicio-velocidad {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .hist-servicio-velocidad-rapido {
      background: rgba(40, 167, 69, 0.15);
      color: var(--verde-ok, #28a745);
    }
    .hist-servicio-velocidad-lento {
      background: rgba(220, 53, 69, 0.15);
      color: var(--rojo-urgente, #dc3545);
    }
    .hist-servicio-velocidad-normal {
      background: rgba(255,255,255,0.08);
      color: var(--text-muted, #8b94a3);
    }

    .hist-tipo-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hist-chip {
      flex: 1 1 auto;
      min-width: 110px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text-muted, #8b94a3);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-align: center;
    }
    .hist-chip:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text, #e6e9ef);
    }
    .hist-chip.hist-chip-active {
      background: linear-gradient(180deg, #2f7fe0, #2563c4);
      color: #fff;
      border-color: #2f7fe0;
      box-shadow: 0 2px 8px rgba(47, 127, 224, 0.3);
    }

    .hist-search-input {
      width: 100%;
      font-size: 1rem;
      padding: 12px 14px;
    }

    .hist-filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .hist-filtro-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 180px;
      font-size: 0.75rem;
      color: var(--text-muted, #8b94a3);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .hist-select {
      padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      color: var(--text, #e6e9ef);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
    }
    .hist-select:focus {
      outline: none;
      border-color: #2f7fe0;
    }
    .hist-select option {
      background: #15263d;
      color: var(--text, #e6e9ef);
    }
    .hist-btn-limpiar {
      padding: 9px 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text-muted, #8b94a3);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      align-self: flex-end;
    }
    .hist-btn-limpiar:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text, #e6e9ef);
    }

    /* === Lista de órdenes === */
    .hist-ordenes-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hist-orden-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .hist-orden-card:hover {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
    }
    .hist-orden-card.expandida {
      border-color: #2f7fe0;
      background: rgba(47, 127, 224, 0.06);
    }

    .hist-orden-header {
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      user-select: none;
    }
    .hist-orden-header:hover {
      background: rgba(255,255,255,0.02);
    }

    .hist-orden-titulo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hist-orden-num {
      font-family: var(--font-mono, monospace);
      font-weight: 700;
      color: var(--text, #e6e9ef);
      font-size: 0.95rem;
    }
    .hist-orden-placa {
      font-family: var(--font-mono, monospace);
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text, #e6e9ef);
    }
    .hist-orden-vehiculo {
      color: var(--text-muted, #8b94a3);
      font-size: 0.85rem;
    }

    .hist-orden-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted, #8b94a3);
    }
    .hist-orden-meta strong {
      color: var(--text, #e6e9ef);
      font-weight: 600;
    }

    .hist-estado-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .hist-estado-completada {
      background: rgba(40, 167, 69, 0.18);
      color: var(--verde-ok, #28a745);
    }
    .hist-estado-cancelada {
      background: rgba(220, 53, 69, 0.20);
      color: var(--rojo-urgente, #dc3545);
    }
    .hist-estado-en_progreso {
      background: rgba(47, 127, 224, 0.20);
      color: #4a90e2;
    }
    .hist-estado-abierta {
      background: rgba(255, 193, 7, 0.18);
      color: var(--amarillo, #ffc107);
    }
    .hist-estado-pausada {
      background: rgba(255, 193, 7, 0.18);
      color: var(--amarillo, #ffc107);
    }

    .hist-orden-toggle {
      color: var(--text-muted, #8b94a3);
      font-size: 1.1rem;
      transition: transform 0.2s;
      padding: 4px 8px;
    }
    .hist-orden-card.expandida .hist-orden-toggle {
      transform: rotate(180deg);
      color: #2f7fe0;
    }

    /* === Detalle expandido === */
    .hist-orden-detalle {
      padding: 0 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      animation: hist-expand 0.2s ease-out;
    }
    @keyframes hist-expand {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hist-detalle-section {
      margin-top: 14px;
    }
    .hist-detalle-titulo {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted, #8b94a3);
      margin-bottom: 8px;
    }

    /* Servicios dentro del detalle */
    .hist-servicio-row {
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      margin-bottom: 6px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .hist-servicio-info { display: flex; flex-direction: column; gap: 4px; }
    .hist-servicio-nombre {
      font-weight: 600;
      color: var(--text, #e6e9ef);
      font-size: 0.9rem;
    }
    .hist-servicio-tecnico {
      font-size: 0.78rem;
      color: var(--text-muted, #8b94a3);
    }
    .hist-servicio-tecnico strong {
      color: var(--text, #e6e9ef);
      font-weight: 600;
    }
    .hist-servicio-tiempos {
      font-size: 0.75rem;
      color: var(--text-dim, #5d6878);
      font-family: var(--font-mono, monospace);
    }
    .hist-servicio-tiempo-real {
      font-family: var(--font-mono, monospace);
      font-weight: 700;
      color: var(--text, #e6e9ef);
      text-align: right;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .hist-servicio-sospechoso {
      color: var(--rojo-urgente, #dc3545);
      font-size: 0.7rem;
      font-weight: 600;
    }
    .hist-servicio-obs {
      font-size: 0.78rem;
      color: var(--text-muted, #8b94a3);
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed rgba(255,255,255,0.06);
      font-style: italic;
    }
    .hist-servicio-cancelado {
      opacity: 0.65;
    }
    .hist-servicio-cancelado .hist-servicio-nombre {
      text-decoration: line-through;
    }

    /* Pausas dentro del detalle */
    .hist-pausa-row {
      padding: 8px 12px;
      background: rgba(255, 193, 7, 0.06);
      border-left: 3px solid var(--amarillo, #ffc107);
      border-radius: 4px;
