<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F2F4A" />
  <title>Técnico — TECNIMAX Taller</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/tecnico.css" />
</head>
<body class="app-body app-mobile">
  <div class="bg-decoration" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
  </div>

  <header class="app-header">
    <div class="app-brand">
      <strong>TECNIMAX</strong> · Taller · <span id="user-nombre-header">Técnico</span>
    </div>
    <button id="btn-logout" class="btn-logout">Salir</button>
  </header>

  <main class="tecnico-main">

    <!-- Banner: Trabajo activo (se muestra solo si tiene servicio en curso) -->
    <section id="banner-activo" class="banner-activo" hidden>
      <div class="banner-label">TRABAJO ACTIVO</div>
      <div class="banner-content">
        <div class="banner-info">
          <div class="banner-title" id="banner-orden">—</div>
          <div class="banner-sub" id="banner-servicio">—</div>
        </div>
        <div class="banner-time">
          <div class="banner-cronos" id="banner-cronos">00:00:00</div>
          <div class="banner-status" id="banner-status">en curso</div>
        </div>
      </div>
    </section>

    <!-- Buscador -->
    <section class="search-section">
      <input type="search" id="search-input" placeholder="Buscar placa o nº orden..." class="field-input search-input" autocomplete="off" />
    </section>

    <!-- Lista de vehículos -->
    <section class="vehiculos-section">
      <div class="section-title">
        <span>Vehículos en taller</span>
        <span class="section-count" id="vehiculos-count">0</span>
      </div>

      <div id="vehiculos-list" class="vehiculos-list">
        <div class="empty-state">
          <p>Sin vehículos en taller en este momento.</p>
          <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.5rem;">Cuando el jefe cree una orden, aparecerá aquí.</p>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/tecnico.js"></script>
</body>
</html>
